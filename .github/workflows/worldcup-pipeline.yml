name: World Cup content pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "auto, pre-tournament, prediction, or postmatch"
        required: false
        default: "auto"
      strategy:
        description: "classic or viral2"
        required: false
        default: "viral2"
      date:
        description: "Run date, YYYY-MM-DD"
        required: false
      match_id:
        description: "Optional match id"
        required: false
      team_a:
        description: "Team A"
        required: false
      team_b:
        description: "Team B"
        required: false
      kickoff:
        description: "Kickoff time or ISO timestamp"
        required: false
      topic:
        description: "Specific topic or angle"
        required: false
      render:
        description: "Render MP4"
        required: false
        default: "true"
      upload:
        description: "Upload MP4 and sidecars"
        required: false
        default: "true"
      upload_target:
        description: "auto, telegram, google-drive, or r2; blank uses repo variable"
        required: false
        default: ""
      youtube_upload:
        description: "Upload rendered MP4 to YouTube; blank uses repo variable"
        required: false
        default: ""
      youtube_privacy:
        description: "private, unlisted, or public; blank uses repo variable"
        required: false
        default: ""
      youtube_max_per_day:
        description: "Max public/unlisted YouTube uploads per day; blank uses repo variable"
        required: false
        default: ""
      allow_needs_review_upload:
        description: "Upload private review MP4 even when QC says revise"
        required: false
        default: "false"
      quality_mode:
        description: "off or v2; blank uses repo variable"
        required: false
        default: ""
      max_script_retries:
        description: "V2 script retry limit; blank uses repo variable"
        required: false
        default: ""
      max_visual_retries:
        description: "V2 visual retry limit; blank uses repo variable"
        required: false
        default: ""
      strict_publish:
        description: "Block Telegram MP4 unless V2 publish gate passes; blank uses repo variable"
        required: false
        default: ""
      telegram_send_failed_mp4:
        description: "Send rendered V2 review-copy MP4 to Telegram even when final QC is below publish score; blank uses repo variable"
        required: false
        default: ""
      force:
        description: "Ignore daily limit"
        required: false
        default: "true"

permissions:
  contents: read
  actions: read

concurrency:
  group: worldcup-pipeline-${{ github.ref }}
  cancel-in-progress: false

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
  GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
  GOOGLE_PRIVATE_KEY_ID: ${{ secrets.GOOGLE_PRIVATE_KEY_ID }}
  GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
  GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
  GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY_ID: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY_ID }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
  CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
  R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
  GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  GOOGLE_SERVICE_ACCOUNT_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_BASE64 }}
  GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}
  GOOGLE_DRIVE_MAKE_PUBLIC: ${{ vars.GOOGLE_DRIVE_MAKE_PUBLIC || 'false' }}
  GOOGLE_DRIVE_SCOPE: ${{ vars.GOOGLE_DRIVE_SCOPE || 'https://www.googleapis.com/auth/drive' }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TELEGRAM_THREAD_ID: ${{ vars.TELEGRAM_THREAD_ID }}
  WORLD_CUP_TELEGRAM_SEND_SIDECARS: ${{ vars.WORLD_CUP_TELEGRAM_SEND_SIDECARS || 'true' }}
  WORLD_CUP_DRIVE_FALLBACK_TELEGRAM: ${{ vars.WORLD_CUP_DRIVE_FALLBACK_TELEGRAM || 'true' }}
  YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
  WORLD_CUP_UPLOAD_TARGET: ${{ vars.WORLD_CUP_UPLOAD_TARGET || 'telegram' }}
  WORLD_CUP_YOUTUBE_UPLOAD: ${{ vars.WORLD_CUP_YOUTUBE_UPLOAD || 'false' }}
  WORLD_CUP_YOUTUBE_PRIVACY: ${{ vars.WORLD_CUP_YOUTUBE_PRIVACY || 'private' }}
  WORLD_CUP_YOUTUBE_MAX_PER_DAY: ${{ vars.WORLD_CUP_YOUTUBE_MAX_PER_DAY || '5' }}
  WORLD_CUP_YOUTUBE_NOTIFY_SUBSCRIBERS: ${{ vars.WORLD_CUP_YOUTUBE_NOTIFY_SUBSCRIBERS || 'false' }}
  WORLD_CUP_YOUTUBE_METADATA_MODEL: ${{ vars.WORLD_CUP_YOUTUBE_METADATA_MODEL || 'gemini-3.1-flash-lite' }}
  WORLD_CUP_MAX_VIDEOS_PER_DAY: ${{ vars.WORLD_CUP_MAX_VIDEOS_PER_DAY || '3' }}
  WORLD_CUP_SCHEDULE_HOURS: ${{ vars.WORLD_CUP_SCHEDULE_HOURS || '9,15,21' }}
  WORLD_CUP_DEFAULT_LANGUAGE: ${{ vars.WORLD_CUP_DEFAULT_LANGUAGE || 'en' }}
  WORLD_CUP_STRATEGY: ${{ vars.WORLD_CUP_STRATEGY || 'viral2' }}
  WORLD_CUP_LITE_TEXT_MODEL: ${{ vars.WORLD_CUP_LITE_TEXT_MODEL || 'gemini-3.1-flash-lite' }}
  WORLD_CUP_SEARCH_MODEL: ${{ vars.WORLD_CUP_SEARCH_MODEL || 'gemini-2.5-flash-lite' }}
  WORLD_CUP_SEARCH_FALLBACK_MODELS: ${{ vars.WORLD_CUP_SEARCH_FALLBACK_MODELS || 'gemini-2.5-flash,gemini-3.1-flash-lite' }}
  WORLD_CUP_WRITER_MODEL: ${{ vars.WORLD_CUP_WRITER_MODEL || 'gemini-3.1-flash-lite' }}
  WORLD_CUP_EVALUATOR_MODEL: ${{ vars.WORLD_CUP_EVALUATOR_MODEL || 'gemini-3.1-flash-lite' }}
  WORLD_CUP_TTS_REWRITE_MODEL: ${{ vars.WORLD_CUP_TTS_REWRITE_MODEL || 'gemini-3.1-flash-lite' }}
  WORLD_CUP_TTS_MODEL: ${{ vars.WORLD_CUP_TTS_MODEL || 'gemini-3.1-flash-tts-preview' }}
  WORLD_CUP_TTS_FALLBACK_MODELS: ${{ vars.WORLD_CUP_TTS_FALLBACK_MODELS || 'gemini-2.5-flash-preview-tts,gemini-2.5-flash-tts-preview' }}
  WORLD_CUP_AUDIO_SRT_MODEL: ${{ vars.WORLD_CUP_AUDIO_SRT_MODEL || 'gemini-3.1-flash-lite' }}
  WORLD_CUP_AUDIO_SRT_FALLBACK_MODELS: ${{ vars.WORLD_CUP_AUDIO_SRT_FALLBACK_MODELS || 'gemini-2.5-flash' }}
  WORLD_CUP_GEMINI_RETRY_DELAYS: ${{ vars.WORLD_CUP_GEMINI_RETRY_DELAYS || '5000,10000,15000' }}
  WORLD_CUP_RESEARCH_MODE: ${{ vars.WORLD_CUP_RESEARCH_MODE || 'scrape' }}
  WORLD_CUP_RESEARCH_PASSES: ${{ vars.WORLD_CUP_RESEARCH_PASSES || '4' }}
  WORLD_CUP_SCRAPE_MAX_PAGES: ${{ vars.WORLD_CUP_SCRAPE_MAX_PAGES || '6' }}
  WORLD_CUP_SCRAPE_SEARCH_RESULTS: ${{ vars.WORLD_CUP_SCRAPE_SEARCH_RESULTS || '8' }}
  WORLD_CUP_ENABLE_BGM: ${{ vars.WORLD_CUP_ENABLE_BGM || 'true' }}
  WORLD_CUP_BGM_MODE: ${{ vars.WORLD_CUP_BGM_MODE || 'auto' }}
  WORLD_CUP_BGM_VOLUME: ${{ vars.WORLD_CUP_BGM_VOLUME || '0.20' }}
  WORLD_CUP_BGM_FILE: ${{ vars.WORLD_CUP_BGM_FILE }}
  WORLD_CUP_ENABLE_WIKIMEDIA_VISUALS: ${{ vars.WORLD_CUP_ENABLE_WIKIMEDIA_VISUALS || 'false' }}
  WORLD_CUP_MIN_REAL_VISUAL_RATIO: ${{ vars.WORLD_CUP_MIN_REAL_VISUAL_RATIO || '1' }}
  WORLD_CUP_QUALITY_MODE: ${{ vars.WORLD_CUP_QUALITY_MODE || 'v2' }}
  WORLD_CUP_V2_SCRIPT_PUBLISH_SCORE: ${{ vars.WORLD_CUP_V2_SCRIPT_PUBLISH_SCORE || '85' }}
  WORLD_CUP_V2_FINAL_PUBLISH_SCORE: ${{ vars.WORLD_CUP_V2_FINAL_PUBLISH_SCORE || '88' }}
  WORLD_CUP_V2_MAX_SCRIPT_RETRIES: ${{ vars.WORLD_CUP_V2_MAX_SCRIPT_RETRIES || '2' }}
  WORLD_CUP_V2_MAX_VISUAL_RETRIES: ${{ vars.WORLD_CUP_V2_MAX_VISUAL_RETRIES || '3' }}
  WORLD_CUP_V2_REQUIRE_ZERO_FALLBACKS: ${{ vars.WORLD_CUP_V2_REQUIRE_ZERO_FALLBACKS || 'true' }}
  WORLD_CUP_V2_TELEGRAM_SEND_FAILED_MP4: ${{ vars.WORLD_CUP_V2_TELEGRAM_SEND_FAILED_MP4 || 'true' }}
  GEMINI_LITE_TEXT_MODEL: ${{ vars.GEMINI_LITE_TEXT_MODEL || 'gemini-3.1-flash-lite' }}
  GEMINI_RETRY_DELAYS: ${{ vars.GEMINI_RETRY_DELAYS || '5000,10000,15000' }}
  WORLD_CUP_TOPICS: ${{ vars.WORLD_CUP_TOPICS }}
  INPUT_MODE: ${{ github.event.inputs.mode || (github.event_name == 'workflow_dispatch' && 'auto' || 'auto') }}
  INPUT_STRATEGY: ${{ github.event.inputs.strategy || vars.WORLD_CUP_STRATEGY || 'viral2' }}
  INPUT_DATE: ${{ github.event.inputs.date || '' }}
  INPUT_MATCH_ID: ${{ github.event.inputs.match_id || '' }}
  INPUT_TEAM_A: ${{ github.event.inputs.team_a || '' }}
  INPUT_TEAM_B: ${{ github.event.inputs.team_b || '' }}
  INPUT_KICKOFF: ${{ github.event.inputs.kickoff || '' }}
  INPUT_TOPIC: ${{ github.event.inputs.topic || '' }}
  INPUT_RENDER: ${{ github.event.inputs.render || 'true' }}
  INPUT_UPLOAD: ${{ github.event.inputs.upload || 'true' }}
  INPUT_UPLOAD_TARGET: ${{ github.event.inputs.upload_target || vars.WORLD_CUP_UPLOAD_TARGET || 'telegram' }}
  INPUT_YOUTUBE_UPLOAD: ${{ github.event.inputs.youtube_upload || vars.WORLD_CUP_YOUTUBE_UPLOAD || 'false' }}
  INPUT_YOUTUBE_PRIVACY: ${{ github.event.inputs.youtube_privacy || vars.WORLD_CUP_YOUTUBE_PRIVACY || 'private' }}
  INPUT_YOUTUBE_MAX_PER_DAY: ${{ github.event.inputs.youtube_max_per_day || vars.WORLD_CUP_YOUTUBE_MAX_PER_DAY || '5' }}
  INPUT_ALLOW_NEEDS_REVIEW_UPLOAD: ${{ github.event.inputs.allow_needs_review_upload || 'false' }}
  INPUT_QUALITY_MODE: ${{ github.event.inputs.quality_mode || vars.WORLD_CUP_QUALITY_MODE || 'v2' }}
  INPUT_MAX_SCRIPT_RETRIES: ${{ github.event.inputs.max_script_retries || vars.WORLD_CUP_V2_MAX_SCRIPT_RETRIES || '2' }}
  INPUT_MAX_VISUAL_RETRIES: ${{ github.event.inputs.max_visual_retries || vars.WORLD_CUP_V2_MAX_VISUAL_RETRIES || '3' }}
  INPUT_STRICT_PUBLISH: ${{ github.event.inputs.strict_publish || vars.WORLD_CUP_STRICT_PUBLISH || 'true' }}
  INPUT_TELEGRAM_SEND_FAILED_MP4: ${{ github.event.inputs.telegram_send_failed_mp4 || vars.WORLD_CUP_V2_TELEGRAM_SEND_FAILED_MP4 || 'true' }}
  INPUT_FORCE: ${{ github.event.inputs.force || (github.event_name == 'workflow_dispatch' && 'true' || 'false') }}

jobs:
  generate:
    name: Generate World Cup short
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Check JavaScript syntax
        run: |
          node --check server.mjs
          node --check public/app.js
          node --check worldcup/pipeline.mjs
          for file in worldcup/modules/*.mjs; do node --check "$file"; done
          node --check worldcup/cli.mjs

      - name: Run pipeline
        shell: bash
        run: |
          mkdir -p .tmp-worldcup
          node worldcup/cli.mjs \
            --mode "$INPUT_MODE" \
            --strategy "$INPUT_STRATEGY" \
            --date "$INPUT_DATE" \
            --match-id "$INPUT_MATCH_ID" \
            --team-a "$INPUT_TEAM_A" \
            --team-b "$INPUT_TEAM_B" \
            --kickoff "$INPUT_KICKOFF" \
            --topic "$INPUT_TOPIC" \
            --render "$INPUT_RENDER" \
            --upload "$INPUT_UPLOAD" \
            --upload-target "$INPUT_UPLOAD_TARGET" \
            --youtube-upload "$INPUT_YOUTUBE_UPLOAD" \
            --youtube-privacy "$INPUT_YOUTUBE_PRIVACY" \
            --youtube-max-per-day "$INPUT_YOUTUBE_MAX_PER_DAY" \
            --allow-needs-review-upload "$INPUT_ALLOW_NEEDS_REVIEW_UPLOAD" \
            --quality-mode "$INPUT_QUALITY_MODE" \
            --max-script-retries "$INPUT_MAX_SCRIPT_RETRIES" \
            --max-visual-retries "$INPUT_MAX_VISUAL_RETRIES" \
            --strict-publish "$INPUT_STRICT_PUBLISH" \
            --telegram-send-failed-mp4 "$INPUT_TELEGRAM_SEND_FAILED_MP4" \
            --force "$INPUT_FORCE" | tee .tmp-worldcup/last-result.json

      - name: Verify MP4 delivery contract
        if: success()
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          const lastResultPath = path.join('.tmp-worldcup', 'last-result.json');
          if (!fs.existsSync(lastResultPath)) {
            throw new Error('World Cup pipeline did not write .tmp-worldcup/last-result.json');
          }
          const lastResult = JSON.parse(fs.readFileSync(lastResultPath, 'utf8'));
          if (lastResult.skipped) {
            throw new Error(`Dispatched World Cup pipeline skipped instead of producing a video: ${lastResult.reason || 'unknown reason'}`);
          }
          const indexPath = path.join('.tmp-worldcup', 'index.json');
          if (!fs.existsSync(indexPath)) {
            throw new Error('World Cup pipeline did not write .tmp-worldcup/index.json');
          }
          const index = JSON.parse(fs.readFileSync(indexPath, 'utf8'));
          const run = index.runs?.[0];
          if (!run?.id) {
            throw new Error('World Cup pipeline did not create a run.');
          }
          if (run.skipped) {
            throw new Error(`World Cup pipeline skipped instead of producing a video: ${run.reason || 'unknown reason'}`);
          }
          const mp4 = run.files?.mp4;
          if (!mp4) {
            const qualityMode = String(process.env.INPUT_QUALITY_MODE || process.env.WORLD_CUP_QUALITY_MODE || '').toLowerCase();
            const v2Blocked = qualityMode === 'v2' && ['pre_render_blocked', 'rendered_needs_review'].includes(run.status);
            if (v2Blocked && run.qualityV2?.finalDecision === 'blocked') {
              const alertSent = (run.telegram?.messages || []).some((message) => String(message.label || '').startsWith('v2-'));
              if (!alertSent && /^(1|true|yes|on)$/i.test(String(process.env.INPUT_UPLOAD || ''))) {
                throw new Error(`World Cup V2 blocked ${run.id}, but no Telegram quality alert was recorded.`);
              }
              console.log(`World Cup V2 correctly blocked non-publishable run ${run.id}: ${run.qualityV2?.issues?.slice(0, 3).join(' | ') || 'quality gate failed'}`);
              process.exit(0);
            }
            throw new Error(`World Cup run ${run.id} has no MP4 in run.files.`);
          }
          const mp4Path = path.join('.tmp-worldcup', 'runs', run.id, mp4);
          if (!fs.existsSync(mp4Path) || fs.statSync(mp4Path).size <= 0) {
            throw new Error(`World Cup run ${run.id} MP4 is missing or empty: ${mp4Path}`);
          }
          const target = String(process.env.INPUT_UPLOAD_TARGET || '').toLowerCase();
          const uploadEnabled = /^(1|true|yes|on)$/i.test(String(process.env.INPUT_UPLOAD || ''));
          if (uploadEnabled && (target === 'telegram' || target === 'tg' || target === 'telegram-bot')) {
            const sentMp4 = (run.telegram?.messages || []).some((message) => message.label === 'mp4');
            if (!sentMp4) {
              throw new Error(`World Cup run ${run.id} did not record a Telegram MP4 delivery.`);
            }
          }
          const youtubeEnabled = /^(1|true|yes|on)$/i.test(String(process.env.INPUT_YOUTUBE_UPLOAD || process.env.WORLD_CUP_YOUTUBE_UPLOAD || ''));
          if (youtubeEnabled) {
            if (run.youtube?.status !== 'uploaded' || !run.youtube?.videoId) {
              throw new Error(`World Cup run ${run.id} did not record a successful YouTube upload. Status=${run.youtube?.status || 'missing'}`);
            }
            if (!run.files?.youtube || !run.files?.youtubeMetadata) {
              throw new Error(`World Cup run ${run.id} is missing YouTube sidecars.`);
            }
            console.log(`Verified YouTube upload: ${run.youtube.url || run.youtube.videoId}`);
          }
          if ((run.qualityMode === 'v2' || run.qualityV2?.mode === 'v2') && run.qualityV2?.finalDecision !== 'publish_candidate') {
            const reviewCopyAllowed = /^(1|true|yes|on)$/i.test(String(process.env.INPUT_TELEGRAM_SEND_FAILED_MP4 || process.env.WORLD_CUP_V2_TELEGRAM_SEND_FAILED_MP4 || ''));
            const sentMp4 = (run.telegram?.messages || []).some((message) => message.label === 'mp4');
            if (reviewCopyAllowed && sentMp4) {
              console.log(`World Cup V2 sent review-copy MP4 for ${run.id}; QC decision=${run.qualityV2?.finalDecision || 'unknown'}, score=${run.qualityV2?.finalScore || 0}.`);
              process.exit(0);
            }
            throw new Error(`World Cup V2 run ${run.id} rendered MP4 but final decision was ${run.qualityV2?.finalDecision || 'unknown'}.`);
          }
          console.log(`Verified World Cup MP4: ${mp4Path}`);
          NODE

      - name: Notify Telegram on pipeline failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        shell: bash
        run: |
          TEXT="World Cup pipeline failed.
          Repo: ${GITHUB_REPOSITORY}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          Check artifacts/logs before posting."
          ARGS=(-F "chat_id=${TELEGRAM_CHAT_ID}" -F "text=${TEXT}")
          if [ -n "${TELEGRAM_THREAD_ID:-}" ]; then
            ARGS+=(-F "message_thread_id=${TELEGRAM_THREAD_ID}")
          fi
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" "${ARGS[@]}"

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: worldcup-run-artifacts
          path: |
            .tmp-worldcup/index.json
            .tmp-worldcup/runs/**
          if-no-files-found: ignore
          retention-days: 7
